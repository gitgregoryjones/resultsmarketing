    body {
      font-family: 'Nunito', sans-serif;
    }

    .title-font {
      font-family: 'Baloo 2', cursive;
    }

    .cloud-outline {
      position: absolute;
      border: 8px solid rgba(219, 243, 249, 0.45);
      border-radius: 9999px;
      pointer-events: none;
    }

    .cloud-outline::before,
    .cloud-outline::after {
      content: '';
      position: absolute;
      border: 8px solid rgba(219, 243, 249, 0.45);
      border-radius: 9999px;
      background: transparent;
    }

    .cloud-outline::before {
      width: 38%;
      height: 72%;
      left: 10%;
      top: -34%;
    }

    .cloud-outline::after {
      width: 34%;
      height: 65%;
      right: 12%;
      top: -28%;
    }
