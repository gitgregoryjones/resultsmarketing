name: Build and Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_BASE: ${{ vars.SITE_BASE || 'https://gitgregoryjones.github.io/resultsmarketing/' }}
      WSRV_BASE: ${{ vars.WSRV_BASE || 'https://wsrv.nl/?url=' }}
      WSRV_DEFAULT_PARAMS: ${{ vars.WSRV_DEFAULT_PARAMS || '' }}
      REWRITE_EXTERNAL_IMAGES: ${{ vars.REWRITE_EXTERNAL_IMAGES || 'false' }}
      COPY_DOTFILES: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4